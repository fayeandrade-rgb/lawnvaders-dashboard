<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lawnvaders Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px; }

    .header { display: flex; justify-content: space-between; align-items: flex-start;
               margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }
    .subtitle { color: #64748b; font-size: 0.85rem; margin-top: 4px; }
    .cycle-badge { background: #1e293b; border: 1px solid #334155; border-radius: 8px;
                    padding: 8px 14px; font-size: 0.8rem; color: #94a3b8; text-align: right; }
    .cycle-badge strong { color: #e2e8f0; display: block; font-size: 0.9rem; }

    /* Team stats bar */
    .team-stats { display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
                   background: #1e293b; border: 1px solid #334155; border-radius: 12px;
                   padding: 12px 18px; margin-bottom: 20px; }
    .ts-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase;
                 letter-spacing: 0.05em; font-weight: 700; margin-right: 4px; white-space: nowrap; }
    .ts-item { display: flex; flex-direction: column; align-items: center;
                background: #0f172a; border-radius: 8px; padding: 6px 12px; min-width: 72px; }
    .ts-name { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.04em; }
    .ts-val  { font-size: 1.1rem; font-weight: 800; line-height: 1.3; }

    /* Filters */
    .filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
                background: #1e293b; border: 1px solid #334155; border-radius: 12px;
                padding: 14px 18px; margin-bottom: 20px; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-group select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
                            border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; }
    .filter-group select:focus { outline: none; border-color: #3b82f6; }
    button { padding: 7px 16px; border-radius: 6px; font-size: 0.82rem; font-weight: 600;
              cursor: pointer; border: none; }
    .btn-ghost { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn-ghost:hover { color: #e2e8f0; }

    /* Agent cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .agent-card { background: #1e293b; border-radius: 12px; padding: 16px 20px;
                   border: 1px solid #334155; cursor: pointer;
                   transition: border-color 0.15s; }
    .agent-card:hover { border-color: #3b82f6; }
    .agent-card.active { border-color: #3b82f6; background: #1e3a5f; }
    .agent-card.hidden { display: none; }
    .agent-name  { font-size: 0.88rem; font-weight: 700; color: #f1f5f9; line-height: 1.3; }
    .agent-rank  { font-size: 0.7rem; color: #475569; margin-bottom: 8px; margin-top: 2px; }
    .agent-score { font-size: 2rem; font-weight: 800; line-height: 1; }
    .agent-label { font-size: 0.7rem; color: #64748b; margin-top: 4px; }

    /* Legend */
    .legend { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #64748b; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Table */
    .table-wrap { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    thead th { background: #0f172a; color: #94a3b8; text-transform: uppercase; font-size: 0.7rem;
                letter-spacing: 0.05em; padding: 10px 12px; text-align: left; white-space: nowrap; }
    thead th.group-header { color: #3b82f6; border-bottom: 2px solid #1e3a5f; }
    tbody tr { border-top: 1px solid #263044; transition: background 0.15s; }
    tbody tr:hover { background: #263044; }
    tbody tr.hidden { display: none; }
    td { padding: 10px 12px; color: #cbd5e1; white-space: nowrap; }
    td.agent-col { color: #f1f5f9; font-weight: 600; }
    td.rank-col { color: #475569; font-size: 0.78rem; }
    td.muted { color: #475569; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Lawnvaders Dashboard</h1>
      <div class="subtitle">Updated: March 26, 2026 at 08:44 AM</div>
    </div>
    <div class="cycle-badge">
      Pay Cycle
      <strong id="cycle-label"></strong>
    </div>
  </div>

  <div class="team-stats" id="team-stats"></div>

  <div class="filters">
    <div class="filter-group">
      <label>Cycle</label>
      <select id="cycle-filter">
        <option value="current">Current Cycle</option>
        <option value="previous">Previous Cycle</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Agent</label>
      <select id="agent-filter">
        <option value="">All Agents</option>
      </select>
    </div>
    <button class="btn-ghost" onclick="clearFilters()">Clear</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#22c55e"></div> On track</div>
    <div class="legend-item"><div class="dot" style="background:#f59e0b"></div> Needs attention</div>
    <div class="legend-item"><div class="dot" style="background:#ef4444"></div> Below target</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th rowspan="1">Agent</th>
          <th class="group-header">Conversion</th>
          <th class="group-header">Rank</th>
          <th class="group-header">QA Avg</th>
          <th class="group-header">Rank</th>
          <th class="group-header">Audits</th>
          <th class="group-header">ATT %</th>
          <th class="group-header">Rank</th>
          <th class="group-header">Bush %</th>
          <th class="group-header">Leaf %</th>
          <th class="group-header">Lawn Treat %</th>
          <th class="group-header">Mosquito %</th>
          <th class="group-header">Aeration %</th>
          <th class="group-header">Flowerbed %</th>
          <th class="group-header">Ready %</th>
          <th class="group-header">Rank</th>
        </tr>
      </thead>
      <tbody id="score-table"></tbody>
    </table>
  </div>

  <script>
    const CYCLES = {"current": {"label": "3/15/2026 - 3/28/2026", "agents": [{"name": "Edward Tojong", "first": "Edward", "id": "Edward_Tojong", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Kathleen Rosales", "first": "Kathleen", "id": "Kathleen_Rosales", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Saira Atale", "first": "Saira", "id": "Saira_Atale", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Francer Torquator", "first": "Francer", "id": "Francer_Torquator", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Grace Labansawan", "first": "Grace", "id": "Grace_Labansawan", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Roel Ramos", "first": ard", "id": "Edward_Tojong", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Kathleen Rosales", "first": "Kathleen", "id": "Kathleen_Rosales", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Saira Atale", "first": "Saira", "id": "Saira_Atale", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Francer Torquator", "first": "Francer", "id": "Francer_Torquator", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Grace Labansawan", "first": "Grace", "id": "Grace_Labansawan", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}, {"name": "Roel Ramos", "first": "Roel", "id": "Roel_Ramos", "isNewbie": true, "rank": 99, "conversion": "-", "conv_rank": "-", "att_pct": "-", "att_rank": "-", "bush_pct": "-", "leaf_pct": "-", "lawn_treat_pct": "-", "mosquito_pct": "-", "aeration_pct": "-", "flowerbed_pct": "-", "ready_pct": "-", "ready_rank": "-", "qa_avg": "-", "qa_count": "-", "qa_rank": "-"}], "team": {"conversion": "-", "conversion_color": "#94a3b8", "qa": "-", "qa_color": "#94a3b8", "att": null, "att_color": null, "bush": null, "bush_color": null, "leaf": null, "leaf_color": null, "lawn": null, "lawn_color": null, "mosq": null, "mosq_color": null, "aer": null, "aer_color": null, "flower": null, "flower_color": null, "ready": "-", "ready_color": "#94a3b8"}, "team_groups": {"tenured": {"conversion": "-", "conversion_color": "#94a3b8", "qa": "-", "qa_color": "#94a3b8", "att": null, "att_color": null, "bush": null, "bush_color": null, "leaf": null, "leaf_color": null, "lawn": null, "lawn_color": null, "mosq": null, "mosq_color": null, "aer": null, "aer_color": null, "flower": null, "flower_color": null, "ready": "-", "ready_color": "#94a3b8"}, "newbies": {"conversion": "-", "conversion_color": "#94a3b8", "qa": "-", "qa_color": "#94a3b8", "att": "-", "att_color": "#94a3b8", "bush": "-", "bush_color": "#94a3b8", "leaf": "-", "leaf_color": "#94a3b8", "lawn": "-", "lawn_color": "#94a3b8", "mosq": "-", "mosq_color": "#94a3b8", "aer": "-", "aer_color": "#94a3b8", "flower": "-", "flower_color": "#94a3b8", "ready": "-", "ready_color": "#94a3b8"}, "all": {"conversion": "-", "conversion_color": "#94a3b8", "qa": "-", "qa_color": "#94a3b8", "att": "-", "att_color": "#94a3b8", "bush": "-", "bush_color": "#94a3b8", "leaf": "-", "leaf_color": "#94a3b8", "lawn": "-", "lawn_color": "#94a3b8", "mosq": "-", "mosq_color": "#94a3b8", "aer": "-", "aer_color": "#94a3b8", "flower": "-", "flower_color": "#94a3b8", "ready": "-", "ready_color": "#94a3b8"}}}};

    function sc(val, mode) {
      const v = parseFloat(String(val).replace('%', ''));
      if (isNaN(v)) return '#94a3b8';
      if (mode === 'score') { return v >= 90 ? '#22c55e' : v >= 75 ? '#f59e0b' : '#ef4444'; }
      if (mode === 'ready') { return v >= 85 ? '#22c55e' : v >= 75 ? '#f59e0b' : '#ef4444'; }
      return v >= 15 ? '#22c55e' : v >= 10 ? '#f59e0b' : '#ef4444';
    }

    function renderTeamStats(t, label) {
      document.getElementById('team-stats').innerHTML =
        '<div class="ts-label">' + (label || 'Team Avg') + '</div>' +
        ts('Conversion', t.conversion, t.conversion_color) +
        ts('QA',         t.qa,         t.qa_color) +
        ts('ATT',        t.att,        t.att_color) +
        ts('Bush',       t.bush,       t.bush_color) +
        ts('Leaf',       t.leaf,       t.leaf_color) +
        ts('Lawn Treat', t.lawn,       t.lawn_color) +
        ts('Mosquito',   t.mosq,       t.mosq_color) +
        ts('Aeration',   t.aer,        t.aer_color) +
        ts('Flowerbed',  t.flower,     t.flower_color) +
        ts('Ready',      t.ready,      t.ready_color);
    }

    function avgVal(agents, key) {
      const vals = agents.map(a => parseFloat(String(a[key]).replace('%',''))).filter(v => !isNaN(v));
      if (!vals.length) return null;
      return vals.reduce((a,b) => a+b, 0) / vals.length;
    }

    function recomputeTeamStats(agents, label) {
      const p = (key, suffix) => { const v = avgVal(agents, key); return v !== null ? v.toFixed(2) + (suffix||'') : '-'; };
      const t = {
        conversion: p('conversion','%'), conversion_color: sc(avgVal(agents,'conversion'),'pct'),
        qa:         p('qa_avg',''),      qa_color:         sc(avgVal(agents,'qa_avg'),'score'),
        att:        p('att_pct','%'),    att_color:        sc(avgVal(agents,'att_pct'),'pct'),
        bush:       p('bush_pct','%'),   bush_color:       sc(avgVal(agents,'bush_pct'),'pct'),
        leaf:       p('leaf_pct','%'),   leaf_color:       sc(avgVal(agents,'leaf_pct'),'pct'),
        lawn:       p('lawn_treat_pct','%'), lawn_color:   sc(avgVal(agents,'lawn_treat_pct'),'pct'),
        mosq:       p('mosquito_pct','%'),   mosq_color:   sc(avgVal(agents,'mosquito_pct'),'pct'),
        aer:        p('aeration_pct','%'),   aer_color:    sc(avgVal(agents,'aeration_pct'),'pct'),
        flower:     p('flowerbed_pct','%'),  flower_color: sc(avgVal(agents,'flowerbed_pct'),'pct'),
        ready:      p('ready_pct','%'),  ready_color:      sc(avgVal(agents,'ready_pct'),'ready'),
      };
      renderTeamStats(t, label);
    }

    function ts(name, val, color) {
      return '<div class="ts-item"><span class="ts-name">' + name +
             '</span><span class="ts-val" style="color:' + (color||'#94a3b8') + '">' +
             (val||'-') + '</span></div>';
    }

    function renderCards(agents) {
      const agentVal = document.getElementById('agent-filter').value;
      document.getElementById('cards').innerHTML = agents.map(ag => {
        const color = sc(ag.conversion, 'pct');
        const hidden = agentVal && ag.name !== agentVal ? ' hidden' : '';
        const active = agentVal && ag.name === agentVal ? ' active' : '';
        return '<div class="agent-card' + hidden + active + '" id="card-' + ag.id +
               '" data-agent="' + ag.name + '">' +
               '<div class="agent-name">' + ag.first + '</div>' +
               '<div class="agent-rank">#' + ag.conv_rank + ' team</div>' +
               '<div class="agent-score" style="color:' + color + '">' + ag.conversion + '</div>' +
               '<div class="agent-label">Conversion</div></div>';
      }).join('');
      document.querySelectorAll('.agent-card').forEach(card => {
        card.addEventListener('click', () => {
          const sel = document.getElementById('agent-filter');
          sel.value = sel.value === card.dataset.agent ? '' : card.dataset.agent;
          applyAgentFilter();
        });
      });
    }

    function renderTable(agents) {
      document.getElementById('score-table').innerHTML = agents.map(ag => {
        return '<tr data-agent="' + ag.name + '">' +
          '<td class="agent-col">' + ag.name + '</td>' +
          '<td><strong style="color:' + sc(ag.conversion,'pct')      + '">' + ag.conversion     + '</strong></td>' +
          '<td class="rank-col">#' + ag.conv_rank  + '</td>' +
          '<td><strong style="color:' + sc(ag.qa_avg,'score')        + '">' + ag.qa_avg         + '</strong></td>' +
          '<td class="rank-col">#' + ag.qa_rank    + '</td>' +
          '<td class="muted">'    + ag.qa_count    + '</td>' +
          '<td><strong style="color:' + sc(ag.att_pct,'pct')         + '">' + ag.att_pct        + '</strong></td>' +
          '<td class="rank-col">#' + ag.att_rank   + '</td>' +
          '<td><strong style="color:' + sc(ag.bush_pct,'pct')        + '">' + ag.bush_pct       + '</strong></td>' +
          '<td><strong style="color:' + sc(ag.leaf_pct,'pct')        + '">' + ag.leaf_pct       + '</strong></td>' +
          '<td><strong style="color:' + sc(ag.lawn_treat_pct,'pct')  + '">' + ag.lawn_treat_pct + '</strong></td>' +
          '<td><strong style="color:' + sc(ag.mosquito_pct,'pct')    + '">' + ag.mosquito_pct   + '</strong></td>' +
          '<td><strong style="color:' + sc(ag.aeration_pct,'pct')    + '">' + ag.aeration_pct   + '</strong></td>' +
          '<td><strong style="color:' + sc(ag.flowerbed_pct,'pct')   + '">' + ag.flowerbed_pct  + '</strong></td>' +
          '<td><strong style="color:' + sc(ag.ready_pct,'ready')     + '">' + ag.ready_pct      + '</strong></td>' +
          '<td class="rank-col">#' + ag.ready_rank + '</td>' +
          '</tr>';
      }).join('');
    }

    function renderAgentOptions(agents) {
      const sel = document.getElementById('agent-filter');
      const cur = sel.value;
      sel.innerHTML = '<option value="">All Agents</option>' +
        '<option value="__tenured__"' + (cur === '__tenured__' ? ' selected' : '') + '>👔 Tenured</option>' +
        '<option value="__newbies__"' + (cur === '__newbies__' ? ' selected' : '') + '>⭐ Newbies</option>' +
        agents.filter(ag => !ag.isNewbie).map(ag => '<option value="' + ag.name + '"' +
          (ag.name === cur ? ' selected' : '') + '>' + ag.name + '</option>').join('') +
        agents.filter(ag => ag.isNewbie).map(ag => '<option value="' + ag.name + '"' +
          (ag.name === cur ? ' selected' : '') + '>' + ag.name + '</option>').join('');
    }

    function renderCycle(key) {
      const data = CYCLES[key];
      document.getElementById('cycle-label').textContent = data.label;
      renderTeamStats(data.team);
      renderAgentOptions(data.agents);
      renderCards(data.agents);
      renderTable(data.agents);
      applyAgentFilter();
    }

    function applyAgentFilter() {
      const agentVal = document.getElementById('agent-filter').value;
      const cycleKey = document.getElementById('cycle-filter').value;
      const allAgents = CYCLES[cycleKey].agents;
      const newbieNames = new Set(allAgents.filter(a => a.isNewbie).map(a => a.name));

      let filteredAgents, statsLabel;
      if (!agentVal)                  { filteredAgents = allAgents;                              statsLabel = 'Team Avg'; }
      else if (agentVal === '__newbies__') { filteredAgents = allAgents.filter(a => a.isNewbie);    statsLabel = 'Newbies Avg'; }
      else if (agentVal === '__tenured__') { filteredAgents = allAgents.filter(a => !a.isNewbie);   statsLabel = 'Tenured Avg'; }
      else                            { filteredAgents = allAgents.filter(a => a.name === agentVal); statsLabel = agentVal.split(' ')[0]; }

      document.querySelectorAll('#score-table tr').forEach(tr => {
        let match;
        if (!agentVal) match = true;
        else if (agentVal === '__newbies__') match = newbieNames.has(tr.dataset.agent);
        else if (agentVal === '__tenured__') match = !newbieNames.has(tr.dataset.agent);
        else match = tr.dataset.agent === agentVal;
        tr.classList.toggle('hidden', !match);
      });
      document.querySelectorAll('.agent-card').forEach(card => {
        let match;
        if (!agentVal) match = true;
        else if (agentVal === '__newbies__') match = newbieNames.has(card.dataset.agent);
        else if (agentVal === '__tenured__') match = !newbieNames.has(card.dataset.agent);
        else match = card.dataset.agent === agentVal;
        card.classList.toggle('hidden', !match);
        const isGroup = agentVal === '__newbies__' || agentVal === '__tenured__';
        card.classList.toggle('active', !!(agentVal && !isGroup && card.dataset.agent === agentVal));
      });

      if (!agentVal || agentVal === '__tenured__' || agentVal === '__newbies__') {
        const gkey = !agentVal ? 'all' : agentVal === '__tenured__' ? 'tenured' : 'newbies';
        renderTeamStats(CYCLES[cycleKey].team_groups[gkey], statsLabel);
      } else {
        recomputeTeamStats(filteredAgents, statsLabel);
      }
    }

    function clearFilters() {
      document.getElementById('agent-filter').value = '';
      applyAgentFilter();
    }

    document.getElementById('cycle-filter').addEventListener('change', function() {
      renderCycle(this.value);
    });

    document.getElementById('agent-filter').addEventListener('change', applyAgentFilter);

    // Init
    renderCycle('current');

    // Silent auto-refresh every 1 hour
    setTimeout(() => location.reload(), 60 * 60 * 1000);
  </script>
</body>
</html>
